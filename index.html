<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--bg:#0e1320;--card:#171f33;--card2:#121829;--tx:#eaf0ff;--mut:#9fb0d6;--acc:#6f9bff;--acc2:#43e0a0;--bd:rgba(255,255,255,.08)}
html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font:16px/1.45 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;overscroll-behavior:none}
body{-webkit-user-select:none;user-select:none}
.wrap{max-width:760px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:max(10px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom)) 12px}
.bar{position:sticky;top:0;z-index:5;background:rgba(14,19,32,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);margin:0 -12px 10px;padding:10px 12px}
h1{font-size:17px;margin:0 0 8px}
input.s{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--bd);background:#0f1626;color:var(--tx);font-size:16px;outline:none}
.cats{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;border:1px solid var(--bd);background:#0f1626;color:var(--tx);padding:7px 11px;border-radius:999px;font-size:13px;cursor:pointer}
.chip.on{background:rgba(111,155,255,.22);border-color:rgba(111,155,255,.5)}
.meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--mut)}
.pg{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.pg>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.card{flex:1;margin-top:12px;border:1px solid var(--bd);border-radius:18px;background:linear-gradient(180deg,var(--card),var(--card2));padding:16px;min-height:55vh;display:flex;flex-direction:column;cursor:pointer}
.tag{align-self:flex-start;font-size:12px;color:#cfe;background:rgba(111,155,255,.18);border:1px solid rgba(111,155,255,.35);padding:5px 9px;border-radius:999px}
.q{font-size:21px;font-weight:700;line-height:1.3;margin-top:12px}
.a{margin-top:14px;font-size:16px;color:#e9eeff;border-top:1px dashed var(--bd);padding-top:14px;display:none}
.card.flip .a{display:block}
.hint{margin-top:auto;color:var(--mut);font-size:12px;padding-top:14px}
.nav{display:flex;gap:8px;margin-top:12px}
button{flex:1;border:1px solid var(--bd);background:#1a2236;color:#fff;border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
button.p{background:linear-gradient(180deg,#2b3a6b,#1e2a52)}
.sub{display:flex;gap:8px;margin-top:8px}
.sub button{font-size:13px;padding:10px;font-weight:500}
.tip{position:fixed;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));background:#172036;border:1px solid var(--bd);border-radius:14px;padding:12px 14px;font-size:13px;color:var(--mut);box-shadow:0 10px 30px rgba(0,0,0,.4);display:none;z-index:9}
.tip b{color:var(--tx)}
.tip span{color:var(--acc);font-weight:700}
.tip .x{float:right;color:var(--tx);cursor:pointer}
</style>

<body>
<div class="wrap">
  <div class="bar">
    <h1>Fiszki — PHP / Symfony / React / TS</h1>

    <div class="cats" id="cats"></div>
    <div class="meta"><span id="count">0/0</span><div class="pg"><i id="pgf"></i></div><span id="catName">Wszystkie</span></div>
  </div>

  <div class="card" id="card">
    <span class="tag" id="tag">—</span>
    <div class="q" id="q">—</div>
    <div class="a" id="a">—</div>
    <div class="hint">Tapnij kartę = odpowiedź · swipe lub ← → = kolejne pytanie</div>
  </div>

  <div class="nav">
    <button id="prev">← Poprzednia</button>
    <button class="p" id="flip">Pokaż / ukryj</button>
    <button id="next">Następna →</button>
  </div>
  <div class="sub">
    <button id="shuffle">Losuj kolejność</button>
    <button id="reset">Reset</button>
  </div>
</div>

<div class="tip" id="tip">
  <span class="x" id="tipx">✕</span>

</div>

<script>
const C = [
/* ===================== PHP ===================== */
{c:"PHP",q:"Co robi declare(strict_types=1)?",a:"Włącza ścisłe typowanie w danym pliku — PHP nie konwertuje automatycznie typów argumentów i wartości zwracanych, dzięki czemu błędy typów wychodzą szybciej."},
{c:"PHP",q:"Różnica między == a ===?",a:"== porównuje wartości po konwersji typów, === porównuje wartość i typ bez konwersji. W logice zwykle używa się ===."},
{c:"PHP",q:"Różnica między interface a abstract class?",a:"Interface to czysty kontrakt bez implementacji i stanu; abstract class może mieć metody z implementacją, pola i konstruktor. Klasa implementuje wiele interfejsów, ale dziedziczy po jednej klasie."},
{c:"PHP",q:"Czym jest trait i kiedy go użyć?",a:"Mechanizm współdzielenia metod między klasami bez dziedziczenia. Dobry do drobnych, wielokrotnie używanych fragmentów; przy większej logice lepsza kompozycja."},
{c:"PHP",q:"Co to jest autoloading i PSR-4?",a:"Autoloading ładuje klasy dopiero, gdy są potrzebne. PSR-4 mapuje namespace na ścieżkę katalogu, dzięki czemu Composer wie, skąd wczytać klasę."},
{c:"PHP",q:"Czym jest Composer?",a:"Menedżer zależności PHP. Instaluje biblioteki, zarządza wersjami (composer.json/lock) i konfiguruje autoloading."},
{c:"PHP",q:"Różnica między composer.json a composer.lock?",a:"json definiuje zakresy wersji zależności, lock zapisuje dokładnie zainstalowane wersje, aby instalacja była powtarzalna na każdym środowisku."},
{c:"PHP",q:"Czym są typy nullable i union types?",a:"Nullable (?Type) pozwala na wartość typu lub null. Union (int|string) dopuszcza kilka konkretnych typów dla jednej zmiennej/parametru."},
{c:"PHP",q:"Co to są named arguments?",a:"Przekazywanie argumentów po nazwie parametru zamiast po kolejności, co poprawia czytelność i pozwala pominąć opcjonalne argumenty."},
{c:"PHP",q:"Czym są enums w PHP 8.1?",a:"Typ reprezentujący zamknięty zbiór wartości. Backed enum ma przypisaną wartość skalarna; enum może mieć też metody."},
{c:"PHP",q:"Do czego służy readonly property?",a:"Pole, które po inicjalizacji nie może być zmienione. Ułatwia tworzenie obiektów niemutowalnych jak DTO czy value object."},
{c:"PHP",q:"Czym są atrybuty (attributes)?",a:"Metadane zapisywane w kodzie składnią #[...], czytane przez refleksję. Zastępują adnotacje w docblockach, np. w routingu czy ORM."},
{c:"PHP",q:"Jak działają wyjątki i hierarchia Throwable?",a:"Throwable to bazowy interfejs; dziedziczą po nim Error (błędy silnika) i Exception (błędy aplikacyjne). Wyjątki łapie się try/catch i można tworzyć własne klasy."},
{c:"PHP",q:"Różnica między Error a Exception?",a:"Exception to błędy aplikacji, które zwykle obsługujesz. Error to błędy poziomu silnika (np. TypeError); oba implementują Throwable."},
{c:"PHP",q:"Czym jest late static binding (static::)?",a:"Mechanizm, w którym static:: wskazuje na klasę wywołującą w czasie wykonania, a nie tę, w której zdefiniowano metodę (jak self::)."},
{c:"PHP",q:"Różnica między self:: a static::?",a:"self:: odnosi się do klasy, w której metodę zdefiniowano; static:: do klasy faktycznie wywołującej, co uwzględnia dziedziczenie."},
{c:"PHP",q:"Czym jest closure i use w funkcjach anonimowych?",a:"Closure to funkcja anonimowa; przez use przechwytuje zmienne z otoczenia (przez wartość lub referencję)."},
{c:"PHP",q:"Różnica między include a require?",a:"Oba dołączają plik; require przy braku pliku rzuca fatal error i przerywa wykonanie, include daje tylko warning."},
{c:"PHP",q:"Czym jest generator i słowo yield?",a:"Generator to funkcja zwracająca wartości leniwie przez yield, bez budowania całej tablicy w pamięci — przydatne przy dużych zbiorach danych."},
{c:"PHP",q:"Jak działa przekazywanie przez wartość i referencję?",a:"Domyślnie zmienne przekazywane są przez wartość (kopia). Przez & przekazujesz referencję, więc zmiany wewnątrz funkcji wpływają na oryginał."},
{c:"PHP",q:"Czym jest type juggling?",a:"Automatyczna konwersja typów przez PHP w operacjach i porównaniach, np. '1' + 1. Bywa źródłem subtelnych błędów, stąd === i strict types."},
{c:"PHP",q:"Co to jest __construct i magiczne metody?",a:"Metody specjalne (np. __construct, __get, __set, __call, __invoke) wywoływane automatycznie w określonych sytuacjach życia obiektu."},
{c:"PHP",q:"Różnica między public, protected i private?",a:"public dostępne wszędzie, protected w klasie i klasach dziedziczących, private tylko w danej klasie."},
{c:"PHP",q:"Czym jest dependency injection?",a:"Przekazywanie zależności z zewnątrz (zwykle konstruktorem) zamiast tworzenia ich w klasie. Zwiększa testowalność i zmniejsza sprzężenie."},
{c:"PHP",q:"Czym jest IoC (Inversion of Control)?",a:"Odwrócenie kontroli — to kontener/framework decyduje o tworzeniu i dostarczaniu zależności, a nie sama klasa. DI to jedna z jego realizacji."},
{c:"PHP",q:"Co to są zasady SOLID?",a:"Pięć zasad OOP: Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, Dependency Inversion — wspierają utrzymywalny kod."},
{c:"PHP",q:"Co oznacza zasada Single Responsibility?",a:"Klasa powinna mieć jeden powód do zmiany, czyli jedną odpowiedzialność. Łączenie walidacji, zapisu i powiadomień zwykle ją łamie."},
{c:"PHP",q:"Co oznacza Open/Closed Principle?",a:"Kod powinien być otwarty na rozszerzanie, a zamknięty na modyfikację — nowe zachowania dodajesz przez rozszerzenia, a nie przepisywanie istniejącego."},
{c:"PHP",q:"Co oznacza Liskov Substitution Principle?",a:"Obiekt klasy bazowej można zastąpić obiektem klasy pochodnej bez psucia poprawności programu."},
{c:"PHP",q:"Co oznacza Dependency Inversion?",a:"Moduły wysokopoziomowe i niskopoziomowe powinny zależeć od abstrakcji, a nie od konkretów. Zależysz od interfejsów, nie implementacji."},
{c:"PHP",q:"Czym jest DTO?",a:"Data Transfer Object — prosty obiekt przenoszący dane między warstwami, np. wejście/wyjście API, bez logiki biznesowej."},
{c:"PHP",q:"Czym jest Value Object?",a:"Obiekt definiowany przez wartość, zwykle niemutowalny, bez tożsamości (np. Money, Email). Dwa równe wartości są traktowane jak ten sam obiekt."},
{c:"PHP",q:"Różnica między tablicą indeksowaną a asocjacyjną?",a:"Indeksowana ma klucze liczbowe 0,1,2…, asocjacyjna używa kluczy stringowych. W PHP obie to ten sam typ array."},
{c:"PHP",q:"Czym jest spl_autoload i PSR-12?",a:"Mechanizm autoloadingu w PHP; PSR-12 to standard formatowania i stylu kodu rozszerzający PSR-1/PSR-2."},
{c:"PHP",q:"Jak PHP obsługuje sesje?",a:"Dane sesji trzymane są po stronie serwera, a klient dostaje identyfikator sesji w cookie. Sesję startuje się i czyta przez superglobalną $_SESSION."},

/* ===================== Symfony ===================== */
{c:"Symfony",q:"Jak wygląda request lifecycle w Symfony?",a:"Request trafia do front controllera, kernel uruchamia routing, znajduje kontroler, rozwiązuje argumenty, wykonuje akcję i zwraca Response; po drodze działają eventy kernela."},
{c:"Symfony",q:"Co to jest HttpKernel?",a:"Komponent obsługujący cykl request→response: emituje eventy (request, controller, response, exception) i spina przepływ aplikacji."},
{c:"Symfony",q:"Jakie znasz eventy kernela?",a:"M.in. kernel.request, kernel.controller, kernel.view, kernel.response, kernel.exception, kernel.terminate — pozwalają wpiąć się w cykl życia żądania."},
{c:"Symfony",q:"Czym jest Dependency Injection Container?",a:"Centralny rejestr serwisów, który tworzy obiekty i wstrzykuje ich zależności. Konfigurowany przez autowiring i pliki services."},
{c:"Symfony",q:"Co to jest autowiring?",a:"Automatyczne dopasowanie zależności serwisu po typach argumentów konstruktora, bez ręcznej konfiguracji."},
{c:"Symfony",q:"Co to jest autoconfiguration?",a:"Automatyczne tagowanie i konfigurowanie serwisów na podstawie implementowanych interfejsów (np. event subscribery, komendy)."},
{c:"Symfony",q:"Jak działa routing w Symfony?",a:"Mapuje URL i metodę HTTP na kontroler, najczęściej przez atrybuty #[Route]. Może wyciągać parametry ze ścieżki i generować URL po nazwie trasy."},
{c:"Symfony",q:"Jak Symfony rozwiązuje argumenty kontrolera?",a:"Przez value resolvery — na podstawie typu i nazwy argumentu wstrzykuje np. Request, parametry trasy, encje (z MapEntity) czy DTO."},
{c:"Symfony",q:"Co to są listener i subscriber?",a:"Reagują na eventy. Listener konfiguruje się zewnętrznie z eventem, subscriber sam deklaruje, których eventów słucha (getSubscribedEvents)."},
{c:"Symfony",q:"Czym różni się service public od private?",a:"Domyślnie serwisy są private i pobierane przez DI. Public można pobierać bezpośrednio z kontenera, co jest odradzane poza wyjątkami."},
{c:"Symfony",q:"Co to jest environment (env) w Symfony?",a:"Tryb działania aplikacji (dev, prod, test) wpływający na konfigurację, cache i debug. Ustawiany przez APP_ENV."},
{c:"Symfony",q:"Jak działa konfiguracja przez .env?",a:"Zmienne środowiskowe z plików .env trafiają do parametrów; pozwalają konfigurować aplikację bez zmiany kodu i trzymać sekrety poza repo."},
{c:"Symfony",q:"Czym są bundle?",a:"Wtyczki/moduły Symfony dostarczające funkcjonalność i konfigurację. W aplikacji własny kod trzyma się dziś zwykle poza bundlami."},
{c:"Symfony",q:"Jak działa walidacja w Symfony?",a:"Przez constraints (atrybuty/konfig) na właściwościach obiektu i Validator, który zwraca listę naruszeń. Często łączona z DTO lub formularzami."},
{c:"Symfony",q:"Czym jest komponent Form?",a:"Buduje, renderuje i przetwarza formularze, mapuje dane na obiekt i integruje walidację oraz ochronę CSRF."},
{c:"Symfony",q:"Jak zwracać błędy walidacji w API?",a:"Zbierasz naruszenia z Validatora i zwracasz je jako ustrukturyzowaną odpowiedź (np. 422 z listą pól i komunikatów)."},
{c:"Symfony",q:"Czym jest Symfony Security?",a:"Komponent obsługujący uwierzytelnianie i autoryzację: firewalle, providery użytkowników, role i votery."},
{c:"Symfony",q:"Co to jest firewall w Security?",a:"Konfiguracja chroniąca dany obszar aplikacji, definiująca sposób uwierzytelniania (np. form login, JWT) i zasady dostępu."},
{c:"Symfony",q:"Czym jest voter?",a:"Klasa podejmująca granularne decyzje autoryzacyjne dla konkretnej akcji i obiektu, np. czy użytkownik może edytować dany post."},
{c:"Symfony",q:"Różnica między authentication a authorization?",a:"Authentication ustala kim jest użytkownik, authorization decyduje co wolno mu zrobić. Najpierw identyfikacja, potem uprawnienia."},
{c:"Symfony",q:"Czym jest Symfony Messenger?",a:"Komponent do message bus: wysyła komendy/eventy do handlerów, synchronicznie lub asynchronicznie przez transporty (np. kolejki)."},
{c:"Symfony",q:"Kiedy używać asynchronicznego Messengera?",a:"Gdy zadanie nie musi zakończyć się w czasie requestu — np. e-maile, raporty, integracje. Poprawia responsywność i skalowanie."},
{c:"Symfony",q:"Jak działa retry i failure w Messengerze?",a:"Transport może ponawiać nieudane wiadomości wg strategii retry, a po wyczerpaniu prób przenieść je do failure transport (DLQ)."},
{c:"Symfony",q:"Czym jest cache w Symfony?",a:"Komponent Cache (PSR-6/PSR-16) do przechowywania wyników; obok tego HTTP cache i cache kontenera/konfiguracji w prod."},
{c:"Symfony",q:"Jak działa profiler i debug toolbar?",a:"W trybie dev zbierają informacje o request: trasy, zapytania DB, czas, eventy, logi — pomagają diagnozować i optymalizować."},
{c:"Symfony",q:"Czym jest Twig?",a:"Silnik szablonów Symfony z bezpiecznym escapowaniem, dziedziczeniem szablonów, filtrami i funkcjami."},
{c:"Symfony",q:"Jak działają parametry i serwisy w services.yaml?",a:"Definiują konfigurację kontenera: parametry globalne oraz rejestrację i konfigurację serwisów, w tym autowiring i tagi."},
{c:"Symfony",q:"Co to są tagi serwisów?",a:"Etykiety pozwalające kontenerowi rozpoznać serwisy o wspólnej roli (np. event listener, twig extension) i odpowiednio je podłączyć."},
{c:"Symfony",q:"Jak działa MapEntity / ParamConverter?",a:"Automatycznie pobiera encję z bazy na podstawie parametru trasy i wstrzykuje ją jako argument kontrolera."},
{c:"Symfony",q:"Czym jest serializer w Symfony?",a:"Komponent zamieniający obiekty na formaty (JSON/XML) i odwrotnie, z grupami serializacji i obsługą zagnieżdżeń."},
{c:"Symfony",q:"Jak organizować logikę poza kontrolerem?",a:"Kontroler powinien być cienki: deleguje do serwisów aplikacyjnych/handlerów, a logikę biznesową trzyma w warstwie domeny/aplikacji."},
{c:"Symfony",q:"Czym jest CommandBus / handler w praktyce?",a:"Komendy reprezentują intencję, handler ją wykonuje. Rozdziela wejście od wykonania i porządkuje przypadki użycia."},
{c:"Symfony",q:"Jak działają komendy konsolowe (Console)?",a:"Klasy Command z konfiguracją argumentów/opcji i metodą execute; uruchamiane przez bin/console, przydatne do zadań cyklicznych i CLI."},
{c:"Symfony",q:"Jak testuje się aplikację Symfony?",a:"Unit testy serwisów, integracyjne z kontenerem oraz funkcjonalne przez WebTestCase/KernelTestCase symulujące żądania HTTP."},
{c:"Symfony",q:"Jak działa cache konfiguracji w prod?",a:"Symfony kompiluje kontener i routing do zoptymalizowanego cache, dzięki czemu prod nie przelicza konfiguracji przy każdym żądaniu."},

/* ===================== Doctrine / SQL / DB ===================== */
{c:"Doctrine/SQL",q:"Co to jest ORM?",a:"Object-Relational Mapping — mapuje obiekty/encje na tabele bazy, pozwalając pracować na obiektach zamiast pisać ręcznie cały SQL."},
{c:"Doctrine/SQL",q:"Jak działa EntityManager w Doctrine?",a:"Zarządza encjami i ich stanem, śledzi zmiany i synchronizuje je z bazą przez persist/remove i flush."},
{c:"Doctrine/SQL",q:"Co to jest Unit of Work?",a:"Mechanizm Doctrine śledzący zmiany encji w trakcie żądania i przekładający je na zestaw zapytań SQL przy flush."},
{c:"Doctrine/SQL",q:"Co robi persist() i flush()?",a:"persist() bierze encję pod zarząd Doctrine, flush() wykonuje faktyczne zapytania (INSERT/UPDATE/DELETE) synchronizując zmiany z bazą."},
{c:"Doctrine/SQL",q:"Różnica między lazy a eager loading?",a:"Lazy ładuje relacje dopiero przy dostępie, eager od razu (zwykle joinem). Lazy bywa wygodne, ale grozi problemem N+1."},
{c:"Doctrine/SQL",q:"Czym jest problem N+1?",a:"Pobranie listy encji jednym zapytaniem, a potem dodatkowego zapytania na każdy element dla relacji. Rozwiązuje się fetch joinem lub eager loadingiem."},
{c:"Doctrine/SQL",q:"Czym jest DQL?",a:"Doctrine Query Language — język zapytań operujący na encjach i ich polach zamiast na tabelach i kolumnach."},
{c:"Doctrine/SQL",q:"Czym jest QueryBuilder?",a:"Obiektowy sposób budowania zapytań DQL krok po kroku, wygodny przy dynamicznych warunkach."},
{c:"Doctrine/SQL",q:"Do czego służą migracje?",a:"Wersjonują zmiany schematu bazy, dzięki czemu struktura jest powtarzalna i spójna między środowiskami."},
{c:"Doctrine/SQL",q:"Repository czy serwis zapytań?",a:"Repository do operacji związanych z encją/agregatem; dedykowany serwis zapytań do złożonych odczytów raportowych nieprzystających do modelu domeny."},
{c:"Doctrine/SQL",q:"Co to jest kaskadowanie (cascade)?",a:"Automatyczne przenoszenie operacji (persist, remove) z encji nadrzędnej na powiązane. Trzeba używać świadomie, bo łatwo o nadmiarowe usunięcia."},
{c:"Doctrine/SQL",q:"Różnica między INNER a LEFT JOIN?",a:"INNER zwraca tylko pasujące pary z obu tabel, LEFT zwraca wszystkie wiersze z lewej tabeli, uzupełniając NULL-ami brakujące dopasowania."},
{c:"Doctrine/SQL",q:"Co to jest indeks bazodanowy?",a:"Struktura przyspieszająca wyszukiwanie i sortowanie kosztem miejsca i wolniejszych zapisów. Działa, gdy pasuje do warunków zapytań."},
{c:"Doctrine/SQL",q:"Kiedy indeks nie pomaga?",a:"Przy niskiej selektywności, funkcjach na kolumnie, wzorcach LIKE '%x', małych tabelach lub gdy zapytanie i tak czyta większość wierszy."},
{c:"Doctrine/SQL",q:"Co to jest EXPLAIN?",a:"Polecenie pokazujące plan wykonania zapytania: użyte indeksy, typ skanu i szacowaną liczbę wierszy — podstawa optymalizacji."},
{c:"Doctrine/SQL",q:"Co to jest transakcja?",a:"Grupa operacji wykonywanych w całości albo wcale, zapewniająca spójność danych przy zależnych zmianach."},
{c:"Doctrine/SQL",q:"Co oznacza ACID?",a:"Atomicity, Consistency, Isolation, Durability — własności transakcji gwarantujące niepodzielność, spójność, izolację i trwałość zmian."},
{c:"Doctrine/SQL",q:"Jakie są poziomy izolacji transakcji?",a:"Read Uncommitted, Read Committed, Repeatable Read, Serializable — różnią się ochroną przed dirty/non-repeatable/phantom reads kosztem współbieżności."},
{c:"Doctrine/SQL",q:"Różnica między WHERE a HAVING?",a:"WHERE filtruje wiersze przed grupowaniem, HAVING filtruje już po agregacji (GROUP BY)."},
{c:"Doctrine/SQL",q:"Różnica między DELETE, TRUNCATE a DROP?",a:"DELETE usuwa wybrane wiersze (transakcyjnie), TRUNCATE czyści całą tabelę szybko, DROP usuwa samą tabelę ze schematu."},
{c:"Doctrine/SQL",q:"Co to jest klucz obcy (foreign key)?",a:"Ograniczenie wiążące kolumnę z kluczem innej tabeli, pilnujące integralności referencyjnej między rekordami."},
{c:"Doctrine/SQL",q:"Jak modelować relację wiele-do-wielu?",a:"Przez tabelę pośrednią z kluczami obcymi do obu encji; jeśli relacja ma własne atrybuty, modeluje się ją jako osobną encję."},
{c:"Doctrine/SQL",q:"Co to jest normalizacja?",a:"Organizacja danych ograniczająca redundancję i anomalie przez podział na powiązane tabele i zależności funkcyjne."},
{c:"Doctrine/SQL",q:"Kiedy denormalizować?",a:"Gdy odczyt jest krytyczny wydajnościowo i joiny zbyt kosztowne — kosztem trudniejszego utrzymania spójności danych."},
{c:"Doctrine/SQL",q:"Jak wydajnie paginować duże zbiory?",a:"Zamiast dużych OFFSET-ów lepiej keyset/cursor pagination po indeksowanej, stabilnie sortowanej kolumnie."},
{c:"Doctrine/SQL",q:"Czym różni się GROUP BY od DISTINCT?",a:"DISTINCT usuwa duplikaty wierszy, GROUP BY grupuje wiersze, by zastosować funkcje agregujące (COUNT, SUM, AVG)."},
{c:"Doctrine/SQL",q:"Co to jest deadlock?",a:"Sytuacja, gdy dwie transakcje wzajemnie czekają na zwolnienie zasobów. Baza wykrywa to i przerywa jedną z nich."},
{c:"Doctrine/SQL",q:"Optimistic vs pessimistic locking?",a:"Optimistic zakłada brak konfliktu i sprawdza wersję przy zapisie; pessimistic blokuje rekord na czas operacji. Pierwsze skaluje się lepiej, drugie chroni mocniej."},
{c:"Doctrine/SQL",q:"Co to jest connection pooling?",a:"Ponowne wykorzystywanie otwartych połączeń do bazy zamiast otwierania nowego na każde żądanie — zmniejsza narzut i opóźnienia."},
{c:"Doctrine/SQL",q:"Jak Doctrine chroni przed SQL injection?",a:"Używa zapytań parametryzowanych i bindowania wartości, więc dane nie są wklejane bezpośrednio do treści SQL."},

/* ===================== API / HTTP ===================== */
{c:"API/HTTP",q:"Czym jest REST?",a:"Styl architektury API operujący na zasobach przez metody HTTP, bezstanowo, z jednolitym interfejsem i czytelnymi adresami zasobów."},
{c:"API/HTTP",q:"Różnica między PUT a PATCH?",a:"PUT zastępuje cały zasób, PATCH aktualizuje tylko wskazane pola. PUT zwykle traktuje się jako idempotentny."},
{c:"API/HTTP",q:"Różnica między POST a PUT?",a:"POST zwykle tworzy zasób (nieidempotentnie), PUT tworzy lub zastępuje zasób pod znanym identyfikatorem w sposób idempotentny."},
{c:"API/HTTP",q:"Kiedy zwracać 200, 201, 204?",a:"200 — sukces z treścią, 201 — utworzono zasób, 204 — sukces bez treści (np. po DELETE/aktualizacji)."},
{c:"API/HTTP",q:"Co oznaczają 400, 401, 403, 404?",a:"400 — błędne żądanie, 401 — brak uwierzytelnienia, 403 — brak uprawnień, 404 — zasób nie istnieje."},
{c:"API/HTTP",q:"Różnica między 401 a 403?",a:"401 znaczy nie wiem kim jesteś (brak/zła autoryzacja), 403 znaczy wiem kim jesteś, ale nie masz prawa do zasobu."},
{c:"API/HTTP",q:"Co oznacza 422?",a:"Unprocessable Entity — żądanie poprawne składniowo, ale dane nie przechodzą walidacji biznesowej/semantycznej."},
{c:"API/HTTP",q:"Co oznaczają kody 5xx?",a:"Błędy po stronie serwera, np. 500 (ogólny błąd), 502 (zły gateway), 503 (usługa niedostępna), 504 (timeout)."},
{c:"API/HTTP",q:"Czym jest idempotentność?",a:"Wielokrotne wykonanie operacji daje ten sam efekt co jedno. GET, PUT, DELETE powinny być idempotentne, POST zwykle nie."},
{c:"API/HTTP",q:"Czym jest bezstanowość (stateless) w REST?",a:"Każde żądanie zawiera wszystkie potrzebne informacje, serwer nie trzyma stanu sesji klienta między żądaniami — co ułatwia skalowanie."},
{c:"API/HTTP",q:"Jak wersjonować API?",a:"Najczęściej przez ścieżkę (/v1), nagłówek lub typ media. Kluczowe jest kontrolowanie zmian łamiących kompatybilność."},
{c:"API/HTTP",q:"Czym jest CORS?",a:"Mechanizm przeglądarki kontrolujący żądania między różnymi originami. Serwer musi jawnie wskazać dozwolone źródła, metody i nagłówki."},
{c:"API/HTTP",q:"Czym różni się cookie od nagłówka Authorization?",a:"Cookie jest wysyłane automatycznie przez przeglądarkę (ryzyko CSRF), token w nagłówku Authorization dodaje się ręcznie i częściej używa w API."},
{c:"API/HTTP",q:"Czym jest JWT?",a:"Podpisany token (header.payload.signature) z claimami o użytkowniku. Pozwala na bezstanowe uwierzytelnianie, ale wymaga uwagi przy unieważnianiu."},
{c:"API/HTTP",q:"Różnica między uwierzytelnianiem sesyjnym a tokenowym?",a:"Sesyjne trzyma stan po stronie serwera (id w cookie), tokenowe (np. JWT) jest bezstanowe i token niesie dane uwierzytelnienia."},
{c:"API/HTTP",q:"Czym jest rate limiting?",a:"Ograniczanie liczby żądań w czasie, chroniące API przed nadużyciem i przeciążeniem; często sygnalizowane kodem 429."},
{c:"API/HTTP",q:"Jak projektować błędy w API?",a:"Spójny format z kodem statusu, identyfikatorem błędu, czytelnym komunikatem i ewentualnymi szczegółami pól walidacji."},
{c:"API/HTTP",q:"Czym jest paginacja w API?",a:"Zwracanie danych w częściach (offset/limit lub cursor) z metadanymi o stronach, by nie przesyłać ogromnych zbiorów naraz."},
{c:"API/HTTP",q:"Czym jest HATEOAS?",a:"Rozszerzenie REST, w którym odpowiedź zawiera linki do powiązanych akcji/zasobów, prowadząc klienta przez API."},
{c:"API/HTTP",q:"Różnica między REST a GraphQL?",a:"REST udostępnia stałe zasoby przez endpointy, GraphQL pozwala klientowi precyzyjnie określić, jakie pola pobiera jednym zapytaniem."},

/* ===================== Bezpieczeństwo ===================== */
{c:"Security",q:"Czym jest SQL injection i jak się bronić?",a:"Wstrzyknięcie SQL przez nieoczyszczone dane wejściowe. Obrona: zapytania parametryzowane/prepared statements i ORM zamiast sklejania SQL."},
{c:"Security",q:"Czym jest XSS?",a:"Wstrzyknięcie skryptu wykonywanego w przeglądarce ofiary. Obrona: escapowanie wyjścia, walidacja wejścia i Content Security Policy."},
{c:"Security",q:"Czym jest CSRF?",a:"Wymuszenie wykonania akcji w kontekście zalogowanego użytkownika. Obrona: tokeny CSRF, SameSite cookies i sprawdzanie originu."},
{c:"Security",q:"Jak bezpiecznie przechowywać hasła?",a:"Hashować silnym, wolnym algorytmem (bcrypt/argon2) z solą; nigdy nie trzymać haseł jawnie ani szyfrowanych odwracalnie."},
{c:"Security",q:"Różnica między hashowaniem a szyfrowaniem?",a:"Hashowanie jest jednokierunkowe (nie da się odwrócić), szyfrowanie jest dwukierunkowe i wymaga klucza do odszyfrowania."},
{c:"Security",q:"Czym jest HTTPS/TLS?",a:"Szyfrowane połączenie między klientem a serwerem chroniące dane w tranzycie przed podsłuchem i modyfikacją."},
{c:"Security",q:"Czym jest zasada least privilege?",a:"Przyznawanie minimalnych uprawnień potrzebnych do działania, co ogranicza skutki błędów i ataków."},
{c:"Security",q:"Jak chronić sekrety w aplikacji?",a:"Trzymać poza repo (zmienne środowiskowe, secret manager/vault), rotować je i nie logować wartości wrażliwych."},
{c:"Security",q:"Czym jest IDOR?",a:"Insecure Direct Object Reference — dostęp do cudzych zasobów przez podmianę identyfikatora. Obrona: sprawdzanie autoryzacji na poziomie obiektu."},
{c:"Security",q:"Czym jest mass assignment?",a:"Podatność, gdy użytkownik nadpisuje pola, których nie powinien (np. role). Obrona: DTO/whitelisty pól wejściowych."},
{c:"Security",q:"Po co walidować dane po stronie serwera?",a:"Walidacja frontendu poprawia UX, ale można ją ominąć; serwer to jedyne miejsce, które realnie gwarantuje poprawność i bezpieczeństwo danych."},
{c:"Security",q:"Czym jest OWASP Top 10?",a:"Lista najczęstszych ryzyk bezpieczeństwa aplikacji webowych, używana jako punkt odniesienia przy zabezpieczaniu systemów."},

/* ===================== Testy ===================== */
{c:"Testy",q:"Różnica między unit, integration a functional/e2e?",a:"Unit testuje pojedynczy fragment w izolacji, integration współpracę modułów, functional/e2e zachowanie systemu z perspektywy użytkownika lub API."},
{c:"Testy",q:"Co to jest piramida testów?",a:"Model proporcji: dużo szybkich testów jednostkowych, mniej integracyjnych i niewiele kosztownych e2e na szczycie."},
{c:"Testy",q:"Czym jest mock, stub i spy?",a:"Stub dostarcza gotowe odpowiedzi, mock weryfikuje interakcje, spy obserwuje wywołania zachowując realne działanie. To rodzaje test doubles."},
{c:"Testy",q:"Co warto testować w pierwszej kolejności?",a:"Logikę biznesową, krytyczne przepływy i przypadki brzegowe podatne na regresję; trywialne gettery rzadko dają wartość."},
{c:"Testy",q:"Czym jest TDD?",a:"Test-Driven Development — najpierw test (red), potem minimalna implementacja (green), potem refaktor. Cykl red-green-refactor."},
{c:"Testy",q:"Co to jest code coverage i jego ograniczenia?",a:"Procent kodu wykonanego przez testy. Wysokie pokrycie nie gwarantuje jakości — można pokryć kod bez sprawdzania zachowania."},
{c:"Testy",q:"Czym jest kruchy (flaky) test?",a:"Test, który raz przechodzi, raz nie, bez zmian w kodzie — zwykle przez zależność od czasu, kolejności lub stanu zewnętrznego."},
{c:"Testy",q:"Czym jest fixture w testach?",a:"Ustalony zestaw danych/stanu początkowego przygotowany przed testem, aby wyniki były powtarzalne."},
{c:"Testy",q:"Jak testować kod zależny od czasu lub losowości?",a:"Wstrzykiwać zegar/generator jako zależność (clock, random provider), aby kontrolować je w teście zamiast polegać na realnym czasie."},
{c:"Testy",q:"Po co testy regresji?",a:"Aby błąd raz naprawiony nie wrócił — dodaje się test odwzorowujący buga, który chroni przed jego ponownym pojawieniem."},
{c:"Testy",q:"Co to jest test functional w Symfony?",a:"Test uruchamiający kernel i symulujący żądanie HTTP do aplikacji, sprawdzający odpowiedź endpointu end-to-end w obrębie frameworka."},
{c:"Testy",q:"Czym jest PHPUnit?",a:"Standardowy framework testów jednostkowych w PHP: asercje, data providery, mocki i organizacja testów w klasy."},
{c:"Testy",q:"Dlaczego nadmiar mocków jest problemem?",a:"Testy zaczynają sprawdzać implementację zamiast zachowania, stają się kruche i utrudniają refaktoryzację mimo niezmienionego efektu."},

/* ===================== React ===================== */
{c:"React",q:"Czym jest Virtual DOM?",a:"Lekka reprezentacja UI w pamięci. React porównuje ją między renderami i aktualizuje realny DOM tylko tam, gdzie faktycznie zaszła zmiana."},
{c:"React",q:"Co to jest JSX?",a:"Rozszerzenie składni pozwalające pisać strukturę UI podobną do HTML w JavaScript; kompilowane do wywołań tworzących elementy React."},
{c:"React",q:"Różnica między props a state?",a:"Props to dane wejściowe przekazywane z zewnątrz (tylko do odczytu), state to wewnętrzny, zmienny stan komponentu."},
{c:"React",q:"Kiedy komponent się re-renderuje?",a:"Gdy zmieni się jego state, props lub używany context, albo gdy re-renderuje się jego rodzic."},
{c:"React",q:"Jak działa useState?",a:"Zwraca aktualną wartość stanu i funkcję do jej zmiany; wywołanie settera planuje re-render komponentu z nową wartością."},
{c:"React",q:"Jak działa useEffect?",a:"Uruchamia efekty uboczne po renderze (fetch, subskrypcje, synchronizacja). Tablica zależności kontroluje, kiedy efekt się wykonuje, a funkcja zwrotna sprząta."},
{c:"React",q:"Częste błędy w useEffect?",a:"Błędna tablica zależności, pętle renderów, brak cleanupu, używanie efektu do logiki, którą można policzyć podczas renderu."},
{c:"React",q:"Do czego służy tablica zależności useEffect?",a:"Określa, od jakich wartości zależy efekt — efekt wykonuje się ponownie tylko, gdy któraś z nich się zmieni."},
{c:"React",q:"Controlled vs uncontrolled component?",a:"Controlled ma wartość sterowaną przez state Reacta, uncontrolled trzyma stan w DOM (przez ref). Controlled daje pełną kontrolę i łatwą walidację."},
{c:"React",q:"Co to jest lifting state up?",a:"Przeniesienie współdzielonego stanu do wspólnego rodzica, by kilka komponentów korzystało z jednego źródła prawdy."},
{c:"React",q:"Jak działa useMemo?",a:"Zapamiętuje wynik kosztownego obliczenia i przelicza go tylko, gdy zmienią się zależności — optymalizacja, gdy faktycznie potrzebna."},
{c:"React",q:"Jak działa useCallback?",a:"Zapamiętuje referencję funkcji między renderami, co pomaga, gdy funkcja jest zależnością efektu lub propsem memoizowanego komponentu."},
{c:"React",q:"Jak działa useRef?",a:"Trzyma mutowalną wartość lub referencję do elementu DOM bez wywoływania re-renderu przy zmianie."},
{c:"React",q:"Jak działa useContext?",a:"Pozwala odczytać wartość kontekstu bez przekazywania propsów przez kolejne poziomy (props drilling)."},
{c:"React",q:"Jak działa useReducer?",a:"Zarządza złożonym stanem przez reducer (state, action) → newState; przydatny przy wielu powiązanych zmianach stanu."},
{c:"React",q:"Czym jest Context API i jego ograniczenia?",a:"Mechanizm globalnego przekazywania danych w drzewie. Przy częstych zmianach może powodować nadmiarowe re-rendery konsumentów."},
{c:"React",q:"Po co klucze (key) na listach?",a:"Pomagają Reactowi identyfikować elementy między renderami; stabilne klucze zapobiegają błędom UI i niepotrzebnym przeliczeniom."},
{c:"React",q:"Dlaczego index jako key bywa zły?",a:"Przy zmianie kolejności lub usuwaniu elementów index przestaje stabilnie identyfikować element, co psuje stan inputów i wydajność."},
{c:"React",q:"Jakie są reguły hooków?",a:"Wywoływać je tylko na najwyższym poziomie komponentu/hooka i tylko w komponentach lub własnych hookach — nigdy warunkowo czy w pętlach."},
{c:"React",q:"Czym jest custom hook?",a:"Funkcja zaczynająca się od use, która wydziela i reużywa logikę stanową/efekty między komponentami."},
{c:"React",q:"Czym jest code splitting i lazy loading?",a:"Dzielenie bundla na fragmenty ładowane na żądanie (React.lazy + Suspense), co skraca początkowy czas ładowania."},
{c:"React",q:"Jak zarządzać stanem serwerowym?",a:"Najlepiej narzędziem typu React Query/TanStack Query, które obsługuje cache, refetch, loading i błędy zamiast ręcznego zarządzania fetchami."},
{c:"React",q:"Stan lokalny vs globalny — jak decydować?",a:"Lokalny dla danych jednego komponentu, globalny tylko dla naprawdę współdzielonych; stan serwera trzymać osobno od stanu UI."},
{c:"React",q:"Jak obsługiwać loading, error i empty state?",a:"Jawnie renderować trzy stany pobierania danych, by użytkownik wiedział, czy trwa ładowanie, wystąpił błąd, czy wynik jest pusty."},
{c:"React",q:"Czym jest reconciliation?",a:"Proces, w którym React porównuje nowe i poprzednie drzewo elementów i aplikuje minimalny zestaw zmian do DOM."},
{c:"React",q:"Czym jest memoizacja komponentu (React.memo)?",a:"Opakowanie komponentu, które pomija re-render, gdy jego props się nie zmieniły (płytkie porównanie)."},
{c:"React",q:"Czym jest prop drilling i jak go ograniczyć?",a:"Przekazywanie propsów przez wiele poziomów tylko po to, by dotarły niżej. Ogranicza się go przez context, kompozycję lub state managery."},
{c:"React",q:"Jak optymalizować wydajność renderowania?",a:"Najpierw mierzyć profilerem, potem ograniczać zbędne re-rendery, dzielić komponenty, memoizować tam, gdzie pomaga i poprawiać strukturę danych."},
{c:"React",q:"Czym jest Suspense?",a:"Mechanizm pozwalający deklaratywnie obsłużyć stan ładowania (np. lazy components, data fetching) przez fallback UI."},
{c:"React",q:"Jak testować komponenty React?",a:"Najlepiej przez React Testing Library — sprawdzając zachowanie widoczne dla użytkownika (render, interakcje), a nie szczegóły implementacji."},

/* ===================== TypeScript ===================== */
{c:"TypeScript",q:"Różnica między type a interface?",a:"interface opisuje kształt obiektu i łatwo go rozszerzać/scalisz; type jest bardziej elastyczny (uniony, krotki, mapped types). Często używalne wymiennie."},
{c:"TypeScript",q:"unknown vs any?",a:"any wyłącza kontrolę typów, unknown wymaga zawężenia przed użyciem. unknown jest bezpieczniejsze dla danych z zewnątrz."},
{c:"TypeScript",q:"Czym są union types?",a:"Typ przyjmujący jedną z kilku wartości, np. string | number; świetny do modelowania różnych stanów."},
{c:"TypeScript",q:"Czym są intersection types?",a:"Połączenie kilku typów w jeden, który musi spełniać wszystkie naraz (A & B)."},
{c:"TypeScript",q:"Czym są generics?",a:"Parametryzacja typem pozwalająca pisać reużywalny, typowo bezpieczny kod bez powielania, np. Box<T> czy funkcje generyczne."},
{c:"TypeScript",q:"Czym jest narrowing?",a:"Zawężanie typu na podstawie warunków (typeof, in, instanceof, type guard), dzięki czemu TypeScript zna dokładniejszy typ w danym bloku."},
{c:"TypeScript",q:"Czym jest type guard?",a:"Funkcja/wyrażenie zwracające informację o typie (np. x is Foo), pozwalające zawęzić typ w obrębie warunku."},
{c:"TypeScript",q:"Czym są utility types?",a:"Wbudowane typy pomocnicze jak Partial, Required, Pick, Omit, Record, ułatwiające przekształcanie istniejących typów."},
{c:"TypeScript",q:"Do czego służy Partial i Required?",a:"Partial<T> czyni wszystkie pola opcjonalnymi, Required<T> wszystkie wymaganymi — przydatne np. przy aktualizacjach i formularzach."},
{c:"TypeScript",q:"Do czego służą Pick i Omit?",a:"Pick<T,K> wybiera wskazane pola typu, Omit<T,K> usuwa wskazane pola — do tworzenia podzbiorów typów."},
{c:"TypeScript",q:"Do czego służy Record?",a:"Record<K,V> opisuje obiekt-mapę o kluczach K i wartościach V, np. Record<string, number>."},
{c:"TypeScript",q:"Czym są discriminated unions?",a:"Uniony obiektów z wspólnym polem-dyskryminatorem (np. type), które umożliwia bezpieczne zawężanie i wyklucza niemożliwe stany."},
{c:"TypeScript",q:"Czym jest enum vs union literal?",a:"enum to osobny konstrukt z wartościami; union literali (np. 'a' | 'b') jest lżejszy i często wystarcza bez generowania dodatkowego kodu."},
{c:"TypeScript",q:"Różnica między typowaniem compile-time a runtime?",a:"Typy TS znikają po kompilacji i nie chronią danych w czasie działania; dane z zewnątrz warto walidować runtime (np. Zod)."},
{c:"TypeScript",q:"Jak bezpiecznie typować dane z API?",a:"Zdefiniować typy odpowiedzi i dodać walidację runtime lub defensywne mapowanie, bo backend może zwrócić coś innego niż zakłada typ."},
{c:"TypeScript",q:"Czym jest never?",a:"Typ wartości, która nigdy nie wystąpi — np. funkcja zawsze rzucająca wyjątek lub wyczerpane gałęzie w switchu."},
{c:"TypeScript",q:"Czym jest void w TypeScript?",a:"Oznacza brak zwracanej wartości; funkcja typu void nie powinna zwracać użytecznej wartości."},
{c:"TypeScript",q:"Jak typować propsy komponentu React?",a:"Przez interface lub type opisujący propsy i przypisanie ich do komponentu, co daje autouzupełnianie i kontrolę kontraktu."},
{c:"TypeScript",q:"Jak typować eventy w React?",a:"Używając typów React, np. React.ChangeEvent<HTMLInputElement> czy React.FormEvent, zamiast any lub ogólnego Event."},
{c:"TypeScript",q:"Czym jest strict mode w tsconfig?",a:"Zestaw rygorystycznych ustawień (m.in. strictNullChecks), które wcześnie wychwytują błędy i wymuszają bezpieczniejsze typowanie."},

/* ===================== Architektura / Soft ===================== */
{c:"Architektura",q:"Czym jest wzorzec MVC?",a:"Podział na Model (dane/logika), View (prezentacja) i Controller (obsługa żądań). Porządkuje odpowiedzialności w aplikacji."},
{c:"Architektura",q:"Czym jest DDD?",a:"Domain-Driven Design — projektowanie skupione na modelu domeny i wspólnym języku z biznesem; wprowadza encje, value objecty, agregaty i bounded contexts."},
{c:"Architektura",q:"Czym jest bounded context?",a:"Wyraźna granica, w której obowiązuje spójny model i terminologia danej części domeny, oddzielona od innych kontekstów."},
{c:"Architektura",q:"Czym jest agregat w DDD?",a:"Grupa powiązanych obiektów traktowana jak całość z jednym korzeniem (aggregate root), który pilnuje spójności i jest punktem dostępu."},
{c:"Architektura",q:"Czym jest CQRS?",a:"Rozdzielenie operacji zapisu (commands) od odczytu (queries), co pozwala niezależnie optymalizować i modelować obie strony."},
{c:"Architektura",q:"Czym jest event-driven architecture?",a:"Komunikacja przez zdarzenia: komponenty publikują i reagują na eventy, co luzuje sprzężenia i ułatwia skalowanie oraz integracje."},
{c:"Architektura",q:"Monolit vs mikroserwisy?",a:"Monolit jest prostszy w starcie i deployu; mikroserwisy dają niezależność i skalowalność kosztem złożoności sieci, danych i operacji."},
{c:"Architektura",q:"Czym jest warstwowa architektura?",a:"Podział na warstwy (prezentacja, aplikacja, domena, infrastruktura) z kontrolowanymi zależnościami, zwykle skierowanymi do wewnątrz."},
{c:"Architektura",q:"Czym jest clean/hexagonal architecture?",a:"Podejście, w którym domena jest niezależna od frameworka i infrastruktury, a komunikacja z zewnętrznym światem idzie przez porty i adaptery."},
{c:"Architektura",q:"Czym jest coupling i cohesion?",a:"Coupling to stopień zależności między modułami (im niższy, tym lepiej), cohesion to spójność odpowiedzialności w module (im wyższa, tym lepiej)."},
{c:"Architektura",q:"Czym jest dług techniczny?",a:"Koszt przyszłych zmian wynikający z uproszczeń lub zaniedbań. Objawia się spowolnieniem rozwoju i rosnącą liczbą obejść."},
{c:"Architektura",q:"Kiedy refaktorować kod?",a:"Gdy kod utrudnia zmiany lub zwiększa ryzyko błędów, najlepiej przy okazji pracy w danym obszarze, małymi krokami pod osłoną testów."},
{c:"Architektura",q:"Czym jest YAGNI?",a:"You Aren't Gonna Need It — nie buduj funkcji ani abstrakcji na zapas, dopóki nie są realnie potrzebne."},
{c:"Architektura",q:"Czym jest zasada KISS?",a:"Keep It Simple — preferuj proste, zrozumiałe rozwiązania zamiast nadmiernie skomplikowanych, gdy nie ma realnej potrzeby."},
{c:"Architektura",q:"Czym jest DRY i jego pułapki?",a:"Don't Repeat Yourself — unikaj duplikacji wiedzy. Pułapka to przedwczesna abstrakcja łącząca rzeczy, które tylko wyglądają podobnie."},
{c:"Architektura",q:"Czym jest idempotentny consumer wiadomości?",a:"Handler, który bezpiecznie obsłuży tę samą wiadomość wielokrotnie bez psucia stanu — kluczowy przy retry i dostawie at-least-once."},
{c:"Architektura",q:"Czym jest cache invalidation i czemu jest trudna?",a:"Unieważnianie nieaktualnych danych w cache. Trudne, bo balansuje świeżość vs wydajność i łatwo serwować stare lub niespójne dane."},
{c:"Architektura",q:"Jak diagnozować problem wydajnościowy?",a:"Najpierw mierzyć i znaleźć wąskie gardło (DB, I/O, zapytania, payloady), a dopiero potem optymalizować poparte danymi."},
{c:"Architektura",q:"Czym jest CI/CD?",a:"Continuous Integration/Delivery — automatyczne budowanie, testowanie i wdrażanie zmian, co skraca pętlę informacji zwrotnej i obniża ryzyko."},
{c:"Architektura",q:"Po co Docker w projekcie?",a:"Konteneryzacja zapewnia spójne środowisko między developmentem a produkcją i upraszcza uruchamianie zależności (baza, kolejki)."},
{c:"Architektura",q:"Czym jest feature flag?",a:"Przełącznik włączający/wyłączający funkcję bez deployu, umożliwiający stopniowe wdrażanie i szybkie wyłączenie problematycznej zmiany."},
{c:"Architektura",q:"Na co zwracać uwagę w code review?",a:"Poprawność, czytelność, wpływ na architekturę, testy, bezpieczeństwo i utrzymywalność — z konstruktywnym, konkretnym feedbackiem."},
{c:"Architektura",q:"Jak rozbić duży feature na etapy?",a:"Wydzielić minimalny zakres wartości, zależności i ryzyka, a potem dostarczać małymi, testowalnymi i wdrażalnymi krokami."},
{c:"Architektura",q:"Jak zachować kompatybilność wsteczną API?",a:"Zmieniać kontrakty ewolucyjnie: dodawać zamiast usuwać, deprecjonować z zapasem i kontrolować breaking changes wersjonowaniem."},
{c:"Architektura",q:"Jak podejść do pracy z legacy?",a:"Najpierw zrozumieć kontekst i ograniczyć ryzyko zmian (testy charakteryzujące), a potem poprawiać stopniowo miejsca najbardziej utrudniające rozwój."}
];

/* ---------- logika ---------- */
const KEY="fiszki200";
let st={cat:"Wszystkie",q:"",i:0,order:C.map((_,k)=>k)};
try{const r=localStorage.getItem(KEY);if(r)st={...st,...JSON.parse(r)};}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}}

const cats=["Wszystkie",...[...new Set(C.map(x=>x.c))]];
let view=[];

const $=id=>document.getElementById(id);
const card=$("card"),tag=$("tag"),qEl=$("q"),aEl=$("a");

function buildCats(){
  $("cats").innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("div");
    b.className="chip"+(c===st.cat?" on":"");
    b.textContent=c;
    b.onclick=()=>{st.cat=c;st.i=0;save();filter();render();};
    $("cats").appendChild(b);
  });
}
function filter(){
  const q=st.q.trim().toLowerCase();
  view=st.order.map(k=>C[k]).filter(x=>{
    const okCat=st.cat==="Wszystkie"||x.c===st.cat;
    const okQ=!q||(x.q+" "+x.a+" "+x.c).toLowerCase().includes(q);
    return okCat&&okQ;
  });
  if(st.i>=view.length)st.i=0;
}
function render(){
  buildCats();
  if(!view.length){tag.textContent="—";qEl.textContent="Brak wyników";aEl.textContent="";$("count").textContent="0/0";$("pgf").style.width="0%";$("catName").textContent=st.cat;return;}
  const it=view[st.i];
  card.classList.remove("flip");
  tag.textContent=it.c;
  qEl.textContent=it.q;
  aEl.textContent=it.a;
  $("count").textContent=(st.i+1)+"/"+view.length;
  $("pgf").style.width=((st.i+1)/view.length*100)+"%";
  $("catName").textContent=st.cat;
}
function next(){if(view.length){st.i=(st.i+1)%view.length;save();render();}}
function prev(){if(view.length){st.i=(st.i-1+view.length)%view.length;save();render();}}
function flip(){card.classList.toggle("flip");}

card.addEventListener("click",()=>flip());
$("flip").onclick=e=>{e.stopPropagation();flip();};
$("next").onclick=next;
$("prev").onclick=prev;
$("shuffle").onclick=()=>{
  const a=[...st.order];
  for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}
  st.order=a;st.i=0;save();filter();render();
};
$("reset").onclick=()=>{st={cat:"Wszystkie",q:"",i:0,order:C.map((_,k)=>k)};$("search").value="";save();filter();render();};
$("search").value=st.q;
$("search").addEventListener("input",e=>{st.q=e.target.value;st.i=0;save();filter();render();});

let sx=0,sy=0,dragging=false;
card.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=true;},{passive:true});
card.addEventListener("touchend",e=>{
  if(!dragging)return;dragging=false;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0)next();else prev();}
},{passive:true});
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")next();
  if(e.key==="ArrowLeft")prev();
  if(e.key===" "){e.preventDefault();flip();}
});

/* podpowiedź "dodaj do ekranu" — tylko w Safari, nie w trybie standalone */
(function(){
  const standalone = window.navigator.standalone===true || window.matchMedia('(display-mode: standalone)').matches;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const dismissed = localStorage.getItem("tipHidden")==="1";
  if(isIOS && !standalone && !dismissed){
    $("tip").style.display="block";
    $("tipx").onclick=()=>{$("tip").style.display="none";localStorage.setItem("tipHidden","1");};
  }
})();

filter();render();
</script>
